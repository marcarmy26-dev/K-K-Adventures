[build]
  publish = "frontend"

[[redirects]]
  from = "/api/*"
  to = "https://k-k-adventures-1.onrender.com/api/:splat"
  status = 200
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(self), microphone=(self)"
    Content-Security-Policy = "default-src 'self'; img-src 'self' data: blob:; media-src 'self' blob: https://stream.mux.com; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; connect-src 'self' https://k-k-adventures-1.onrender.com wss://k-k-adventures-1.onrender.com https://stream.mux.com https://api.mux.com;"
